<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>AIコンシェルジュに質問 | なみのおうち</title>

<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CEN4DZV654"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CEN4DZV654');
</script>

<style>
  :root {
    --ink: #23404f;
    --sub: #5b7684;
    --sea: #2a7f9e;
    --sea-light: #cfe7ef;
    --sand: #f7f4ee;
    --ok: #1c7a4d;
    --err: #b3403a;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", "Noto Sans TC", "Noto Sans SC", "Noto Sans KR", sans-serif;
    margin: 0;
    background: var(--sand);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  main { width: 100%; max-width: 440px; }
  .langs {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 6px;
    margin-bottom: 14px;
  }
  .lang-chip {
    min-height: 34px;
    padding: 4px 12px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    color: var(--sub);
    background: #ffffff;
    border: 1.5px solid #d7e2e7;
    border-radius: 999px;
    cursor: pointer;
  }
  .lang-chip[aria-pressed="true"] {
    color: #ffffff;
    background: var(--sea);
    border-color: var(--sea);
  }
  .card {
    background: #ffffff;
    border-radius: 20px;
    padding: 28px 22px;
    box-shadow: 0 2px 16px rgba(35, 64, 79, 0.08);
  }
  h1 {
    font-size: 19px;
    margin: 0 0 4px;
    letter-spacing: 0.03em;
    text-align: center;
  }
  .wave { display: block; text-align: center; font-size: 22px; margin-bottom: 10px; }
  .lead {
    font-size: 14px;
    line-height: 1.8;
    margin: 0 0 20px;
    text-align: center;
  }
  .buttons { display: flex; flex-direction: column; gap: 10px; }
  .action {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
    min-height: 58px;
    padding: 10px 16px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.03em;
    color: var(--ink);
    background: #ffffff;
    border: 2px solid var(--sea);
    border-radius: 12px;
    cursor: pointer;
    transition: transform 0.06s ease;
  }
  .action small {
    display: block;
    font-size: 11px;
    font-weight: 400;
    color: var(--sub);
    letter-spacing: 0.04em;
  }
  .primary { background: var(--sea); color: #ffffff; }
  .primary small { color: var(--sea-light); }
  .action:active { transform: scale(0.98); }
  .action:focus-visible, .lang-chip:focus-visible { outline: 3px solid #7fc4da; outline-offset: 2px; }
  .action[disabled] { opacity: 0.6; cursor: wait; }
  .action[hidden] { display: none; }
  #status {
    min-height: 1.5em;
    margin: 14px 0 0;
    font-size: 13px;
    line-height: 1.7;
    text-align: center;
  }
  #status.ok { color: var(--ok); }
  #status.err { color: var(--err); }
  #status a { color: var(--sea); word-break: break-all; }
  .home {
    display: block;
    margin-top: 18px;
    text-align: center;
    font-size: 12px;
    color: var(--sub);
  }
  .home a { color: var(--sea); }
</style>
</head>
<body>
<main>
  <div class="langs" id="langs" role="group" aria-label="Language"></div>
  <div class="card">
    <div style="text-align:right;font-size:10px;color:#b8c8d0;">v3.1</div>
    <span class="wave">🌊</span>
    <h1 id="t-title"></h1>
    <p class="lead" id="t-lead"></p>
    <div class="buttons">
      <button id="btn-copy" class="action primary" type="button">
        📋 <span id="t-copy"></span>
      </button>
      <button id="btn-share" class="action" type="button" hidden>
        📤 <span id="t-share"></span>
      </button>
      <button id="btn-download" class="action" type="button">
        ⬇️ <span id="t-download"></span>
      </button>
    </div>
    <p id="status" role="status" aria-live="polite"></p>
  </div>
  <p class="home"><a href="https://sites.google.com/view/naminoouchi/" id="t-home"></a></p>
  <script>
    /* 呼び出し元(Googleサイト)のタブが残っている前提で自タブを閉じる。
       閉じられない環境(直接アクセス等)では通常遷移にフォールバック */
    document.getElementById("t-home").addEventListener("click", function (e) {
      e.preventDefault();
      var href = this.href;
      window.close();
      setTimeout(function () {
        /* closeが無効だった場合のみここに到達する */
        location.href = href;
      }, 150);
    });
  </script>
</main>

<script>
(function () {
  var MANUAL_URL = "https://naminoouchi.github.io/manual.md";
  var FILE_NAME = "naminoouchi-house-manual.md";
  var FILE_NAME_TXT = "naminoouchi-house-manual.txt";

  /* ================= 言語辞書 ================= */
  var I18N = {
    ja: {
      label: "日本語",
      title: "AIコンシェルジュに質問",
      lead: "ハウスマニュアル全文をお使いのAIチャットに渡して、滞在中の疑問を聞いてみてください。",
      copy: "マニュアルをコピー", copySub: "AIチャットに貼り付け",
      share: "AIアプリに共有", shareSub: "ファイルを直接渡す",
      download: "ファイルをダウンロード", downloadSub: ".mdファイルを保存",
      fetching: "マニュアルを取得中…",
      copied: "✅ コピーしました。AIチャットに貼り付けて質問してください。",
      shared: "✅ 共有しました。AIアプリでファイルについて質問してください。",
      downloaded: "✅ ダウンロードしました。AIチャットにファイルを添付してください。",
      copyFail: "コピーできませんでした。",
      shareFail: "共有できませんでした。コピーをお試しください。",
      dlFail: "ダウンロードできませんでした。",
      fetchFail: "取得に失敗しました。",
      fallback: "こちらを開いて全文を選択してください：",
      home: "← なみのおうち ガイドに戻る"
    },
    en: {
      label: "English",
      title: "Ask the AI Concierge",
      lead: "Give the full house manual to your AI assistant and ask anything about your stay.",
      copy: "Copy manual", copySub: "Paste into your AI chat",
      share: "Share to AI app", shareSub: "Send the file directly",
      download: "Download file", downloadSub: "Save as .md file",
      fetching: "Fetching the manual…",
      copied: "✅ Copied! Paste it into your AI chat and ask away.",
      shared: "✅ Shared! Ask your AI app about the file.",
      downloaded: "✅ Downloaded! Attach the file to your AI chat.",
      copyFail: "Copy failed.",
      shareFail: "Sharing failed — please try Copy instead.",
      dlFail: "Download failed.",
      fetchFail: "Could not fetch the manual.",
      fallback: "Open this link and select all:",
      home: "← Back to Naminoouchi guide"
    },
    pt: {
      label: "Português",
      title: "Pergunte ao Concierge de IA",
      lead: "Entregue o manual completo da casa ao seu assistente de IA e pergunte o que quiser sobre a estadia.",
      copy: "Copiar manual", copySub: "Cole no seu chat de IA",
      share: "Compartilhar com app de IA", shareSub: "Enviar o arquivo diretamente",
      download: "Baixar arquivo", downloadSub: "Salvar como arquivo .md",
      fetching: "Carregando o manual…",
      copied: "✅ Copiado! Cole no seu chat de IA e pergunte à vontade.",
      shared: "✅ Compartilhado! Pergunte ao seu app de IA sobre o arquivo.",
      downloaded: "✅ Baixado! Anexe o arquivo ao seu chat de IA.",
      copyFail: "Não foi possível copiar.",
      shareFail: "Não foi possível compartilhar — tente Copiar.",
      dlFail: "Não foi possível baixar.",
      fetchFail: "Não foi possível carregar o manual.",
      fallback: "Abra este link e selecione tudo:",
      home: "← Voltar ao guia da Naminoouchi"
    },
    es: {
      label: "Español",
      title: "Pregunta al Conserje de IA",
      lead: "Entrega el manual completo de la casa a tu asistente de IA y pregunta lo que quieras sobre tu estancia.",
      copy: "Copiar manual", copySub: "Pégalo en tu chat de IA",
      share: "Compartir con app de IA", shareSub: "Enviar el archivo directamente",
      download: "Descargar archivo", downloadSub: "Guardar como archivo .md",
      fetching: "Cargando el manual…",
      copied: "✅ ¡Copiado! Pégalo en tu chat de IA y pregunta lo que necesites.",
      shared: "✅ ¡Compartido! Pregunta a tu app de IA sobre el archivo.",
      downloaded: "✅ ¡Descargado! Adjunta el archivo a tu chat de IA.",
      copyFail: "No se pudo copiar.",
      shareFail: "No se pudo compartir — prueba con Copiar.",
      dlFail: "No se pudo descargar.",
      fetchFail: "No se pudo cargar el manual.",
      fallback: "Abre este enlace y selecciona todo:",
      home: "← Volver a la guía de Naminoouchi"
    },
    "zh-Hant": {
      label: "繁體中文",
      title: "詢問 AI 禮賓服務",
      lead: "將完整的房屋使用手冊交給您的 AI 助理，隨時詢問住宿相關問題。",
      copy: "複製手冊", copySub: "貼到您的 AI 聊天中",
      share: "分享至 AI 應用程式", shareSub: "直接傳送檔案",
      download: "下載檔案", downloadSub: "儲存為 .md 檔案",
      fetching: "正在取得手冊…",
      copied: "✅ 已複製！請貼到您的 AI 聊天中提問。",
      shared: "✅ 已分享！請在 AI 應用程式中詢問該檔案的內容。",
      downloaded: "✅ 已下載！請將檔案附加到您的 AI 聊天中。",
      copyFail: "無法複製。",
      shareFail: "無法分享，請改用複製。",
      dlFail: "無法下載。",
      fetchFail: "無法取得手冊。",
      fallback: "請開啟此連結並全選：",
      home: "← 返回 Naminoouchi 指南"
    },
    "zh-Hans": {
      label: "简体中文",
      title: "咨询 AI 礼宾服务",
      lead: "将完整的房屋使用手册交给您的 AI 助手，随时询问住宿相关问题。",
      copy: "复制手册", copySub: "粘贴到您的 AI 聊天中",
      share: "分享至 AI 应用", shareSub: "直接发送文件",
      download: "下载文件", downloadSub: "保存为 .md 文件",
      fetching: "正在获取手册…",
      copied: "✅ 已复制！请粘贴到您的 AI 聊天中提问。",
      shared: "✅ 已分享！请在 AI 应用中询问该文件的内容。",
      downloaded: "✅ 已下载！请将文件附加到您的 AI 聊天中。",
      copyFail: "无法复制。",
      shareFail: "无法分享，请改用复制。",
      dlFail: "无法下载。",
      fetchFail: "无法获取手册。",
      fallback: "请打开此链接并全选：",
      home: "← 返回 Naminoouchi 指南"
    },
    ko: {
      label: "한국어",
      title: "AI 컨시어지에게 질문",
      lead: "하우스 매뉴얼 전문을 사용 중인 AI 챗에 전달하고 숙박 중 궁금한 점을 물어보세요.",
      copy: "매뉴얼 복사", copySub: "AI 챗에 붙여넣기",
      share: "AI 앱에 공유", shareSub: "파일을 바로 전달",
      download: "파일 다운로드", downloadSub: ".md 파일로 저장",
      fetching: "매뉴얼을 불러오는 중…",
      copied: "✅ 복사했습니다. AI 챗에 붙여넣고 질문해 보세요.",
      shared: "✅ 공유했습니다. AI 앱에서 파일에 대해 질문해 보세요.",
      downloaded: "✅ 다운로드했습니다. AI 챗에 파일을 첨부해 주세요.",
      copyFail: "복사할 수 없습니다.",
      shareFail: "공유할 수 없습니다. 복사를 이용해 주세요.",
      dlFail: "다운로드할 수 없습니다.",
      fetchFail: "매뉴얼을 불러오지 못했습니다.",
      fallback: "이 링크를 열어 전체 선택해 주세요:",
      home: "← Naminoouchi 가이드로 돌아가기"
    }
  };
  var LANG_ORDER = ["ja", "en", "pt", "es", "zh-Hant", "zh-Hans", "ko"];

  /* ============ 言語判定と切替 ============ */
  function detectLang() {
    try {
      var saved = localStorage.getItem("nmo-lang");
      if (saved && I18N[saved]) return saved;
    } catch (e) {}
    var prefs = navigator.languages || [navigator.language || "en"];
    for (var i = 0; i < prefs.length; i++) {
      var tag = prefs[i].toLowerCase();
      if (tag.indexOf("zh") === 0) {
        return (tag.indexOf("tw") > -1 || tag.indexOf("hk") > -1 || tag.indexOf("mo") > -1 || tag.indexOf("hant") > -1)
          ? "zh-Hant" : "zh-Hans";
      }
      var short = tag.slice(0, 2);
      if (I18N[short]) return short;
    }
    return "en";
  }

  var currentLang = detectLang();
  var statusKind = "";
  var statusKey = "";
  var statusExtra = "";

  function t(key) { return I18N[currentLang][key]; }

  function fallbackLink() {
    return t("fallback") + '<br><a href="' + MANUAL_URL + '" target="_blank" rel="noopener">' + MANUAL_URL + "</a>";
  }

  function setStatus(key, kind, extraHtml) {
    statusKey = key; statusKind = kind || ""; statusExtra = extraHtml || "";
    renderStatus();
  }
  function renderStatus() {
    var el = document.getElementById("status");
    el.className = statusKind;
    el.innerHTML = statusKey ? (t(statusKey) + (statusExtra === "FALLBACK" ? "<br>" + fallbackLink() : statusExtra)) : "";
  }

  function render() {
    document.documentElement.lang = currentLang;
    document.getElementById("t-title").textContent = t("title");
    document.getElementById("t-lead").textContent = t("lead");
    document.getElementById("t-copy").innerHTML = t("copy") + "<small>" + t("copySub") + "</small>";
    document.getElementById("t-share").innerHTML = t("share") + "<small>" + t("shareSub") + "</small>";
    document.getElementById("t-download").innerHTML = t("download") + "<small>" + t("downloadSub") + "</small>";
    document.getElementById("t-home").textContent = t("home");
    document.title = t("title") + " | Naminoouchi";
    var chips = document.querySelectorAll(".lang-chip");
    for (var i = 0; i < chips.length; i++) {
      chips[i].setAttribute("aria-pressed", chips[i].dataset.lang === currentLang ? "true" : "false");
    }
    renderStatus();
  }

  /* 言語チップ生成 */
  var langsEl = document.getElementById("langs");
  LANG_ORDER.forEach(function (code) {
    var b = document.createElement("button");
    b.type = "button";
    b.className = "lang-chip";
    b.dataset.lang = code;
    b.textContent = I18N[code].label;
    b.addEventListener("click", function () {
      currentLang = code;
      try { localStorage.setItem("nmo-lang", code); } catch (e) {}
      track("lang_select", { lang_chip: code });
      render();
    });
    langsEl.appendChild(b);
  });

  /* ============ GA ============ */
  function track(eventName, extra) {
    if (typeof gtag === "function") {
      var params = { widget: "ai_page_v3", lang: currentLang };
      if (extra) { for (var k in extra) { params[k] = extra[k]; } }
      gtag("event", eventName, params);
    }
  }

  /* ============ マニュアル先読み ============ */
  var manualText = null;
  var manualPromise = null;
  function prefetch() {
    manualPromise = fetch(MANUAL_URL + "?t=" + Date.now(), { cache: "no-store" })
      .then(function (res) {
        if (!res.ok) throw new Error("HTTP " + res.status);
        return res.text();
      })
      .then(function (text) { manualText = text; return text; });
    return manualPromise;
  }
  prefetch();
  function fetchManual() {
    if (manualText) { return Promise.resolve(manualText); }
    setStatus("fetching");
    return manualPromise || prefetch();
  }

  var copyBtn = document.getElementById("btn-copy");
  var shareBtn = document.getElementById("btn-share");
  var dlBtn = document.getElementById("btn-download");

  /* ============ 共有 (iOS系のみ表示) ============ */
  var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1);
  var probeFile = null;
  try { probeFile = new File(["nmo"], FILE_NAME, { type: "text/markdown" }); } catch (e) {}
  if (isIOS && probeFile && navigator.canShare && navigator.canShare({ files: [probeFile] })) {
    shareBtn.hidden = false;
  }

  shareBtn.addEventListener("click", function () {
    shareBtn.disabled = true;
    fetchManual()
      .then(function (text) {
        var file = new File([text], FILE_NAME, { type: "text/markdown" });
        var fileType = "md";
        if (!navigator.canShare({ files: [file] })) {
          file = new File([text], FILE_NAME_TXT, { type: "text/plain" });
          fileType = "txt";
        }
        return navigator.share({ files: [file], title: "Naminoouchi House Manual" })
          .then(function () {
            setStatus("shared", "ok");
            track("share_manual", { file_type: fileType });
          });
      })
      .catch(function (err) {
        if (err && err.name === "AbortError") {
          setStatus("");
          track("share_cancel");
        } else {
          setStatus("shareFail", "err");
          track("share_error", { error_name: (err && err.name) || "unknown" });
        }
      })
      .then(function () { shareBtn.disabled = false; });
  });

  /* ============ コピー ============ */
  function legacyCopy(text) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.setAttribute("readonly", "");
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    var ok = false;
    try { ok = document.execCommand("copy"); } catch (e) { ok = false; }
    document.body.removeChild(ta);
    return ok;
  }

  copyBtn.addEventListener("click", function () {
    copyBtn.disabled = true;
    fetchManual()
      .then(function (text) {
        var done = function () {
          setStatus("copied", "ok");
          track("copy_manual");
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(done, function () {
            if (legacyCopy(text)) { done(); }
            else { setStatus("copyFail", "err", "FALLBACK"); }
          });
        } else if (legacyCopy(text)) {
          done();
        } else {
          setStatus("copyFail", "err", "FALLBACK");
        }
      })
      .catch(function () {
        setStatus("fetchFail", "err", "FALLBACK");
      })
      .then(function () { copyBtn.disabled = false; });
  });

  /* ============ ダウンロード ============ */
  dlBtn.addEventListener("click", function () {
    dlBtn.disabled = true;
    fetchManual()
      .then(function (text) {
        var blob = new Blob([text], { type: "text/markdown;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = FILE_NAME;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(url); }, 5000);
        setStatus("downloaded", "ok");
        track("download_manual");
      })
      .catch(function () {
        setStatus("dlFail", "err", "FALLBACK");
      })
      .then(function () { dlBtn.disabled = false; });
  });

  render();
})();
</script>
</body>
</html>
